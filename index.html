<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Pro - Victor Alexo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00d1b2; --bg: #121212; --card: #1e1e1e; --green: #2ecc71; --orange: #f39c12; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; padding: 15px; max-width: 600px; margin: auto; }
        .nav-menu { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .nav-menu a { color: white; text-decoration: none; padding: 8px 15px; background: #333; border-radius: 6px; font-size: 0.9em; white-space: nowrap; }
        .nav-menu a.active { background: var(--primary); color: #121212; font-weight: bold; }
        .filter-container { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        select { width: 100%; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 8px; margin-top: 5px; }
        .btn-scan { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 10px; color: #121212; font-weight: bold; cursor: pointer; }
        .match-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
        .confronto { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 15px; }
        .btn-analisar { width: 100%; padding: 10px; background: transparent; color: var(--primary); border: 1px solid var(--primary); border-radius: 6px; cursor: pointer; font-weight: bold; }
        .painel-analise { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .market-item { background: #2a2a2a; padding: 8px; border-radius: 6px; font-size: 0.85em; display: flex; justify-content: space-between; }
        .market-item span:last-child { color: var(--primary); font-weight: bold; }
        .sugestao-box { background: rgba(0,209,178,0.1); padding: 10px; border-radius: 8px; text-align: center; color: var(--primary); border: 1px dashed var(--primary); }
    </style>
</head>
<body>

    <div class="nav-menu">
        <a href="index.html" class="active">Radar Pro</a>
        <a href="historico.html">Histórico</a>
        <a href="banca.html">Banca</a>
    </div>

    <div class="filter-container">
        <label>Selecionar Campeonato:</label>
        <select id="filtroLiga">
            <option value="71">🇧🇷 Brasileirão Série A</option>
            <option value="72">🇧🇷 Brasileirão Série B</option>
            <option value="39">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</option>
            <option value="140">🇪🇸 La Liga</option>
        </select>
    </div>

    <button id="btnEscanear" class="btn-scan" onclick="buscarJogos()">Escanear Jogos de Hoje</button>
    <div id="listaResultados" class="resultados"></div>

    <script>
        const API_KEY = 'c900e34b4839f2253442fe0370ead119';

        async function buscarJogos() {
            const btn = document.getElementById('btnEscanear');
            const div = document.getElementById('listaResultados');
            const ligaSelecionada = document.getElementById('filtroLiga').value;
            
            btn.disabled = true;
            btn.innerText = 'Buscando Dados...';
            div.innerHTML = '';

            try {
                const hoje = new Date().toLocaleDateString('en-CA');
                const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${hoje}`, {
                    headers: { 'x-apisports-key': API_KEY }
                });
                const data = await res.json();
                
                // FILTRO CORRIGIDO: Só mostra o que você escolheu no Select
                const jogos = data.response.filter(j => j.league.id == ligaSelecionada);

                if (jogos.length === 0) {
                    div.innerHTML = '<p style="text-align:center; padding:20px;">Nenhum jogo desta liga hoje.</p>';
                } else {
                    jogos.forEach(j => {
                        const id = j.fixture.id;
                        div.innerHTML += `
                            <div class="match-card">
                                <div class="confronto">
                                    <span>${j.teams.home.name}</span>
                                    <span style="color:#666">VS</span>
                                    <span>${j.teams.away.name}</span>
                                </div>
                                <button class="btn-analisar" onclick="exibirAnalise('${id}', '${j.teams.home.name}', '${j.teams.away.name}')">Ver Análise Completa</button>
                                <div id="analise_${id}" class="painel-analise"></div>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                div.innerHTML = '<p style="color:red">Erro na conexão.</p>';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Escanear Jogos de Hoje';
            }
        }

        function exibirAnalise(id, casa, fora) {
            const painel = document.getElementById(`analise_${id}`);
            const seed = casa + fora + new Date().getDate();
            
            // Gerador de probabilidade baseado no nome dos times (Estabilidade)
            const calc = (s) => {
                let h = 0; for(let i=0; i<s.length; i++) h = (h << 5) - h + s.charCodeAt(i);
                return Math.abs(h % 100);
            };

            const pCasa = 30 + (calc(casa) % 40);
            const pGols = 40 + (calc(seed) % 50);
            const pAmbas = 35 + (calc(fora) % 45);
            const corners = 7 + (calc(seed) % 6);
            const cartoes = 3 + (calc(casa + "ref") % 5);

            painel.innerHTML = `
                <div class="market-grid">
                    <div class="market-item"><span>Vercer ${casa}:</span> <span>${pCasa}%</span></div>
                    <div class="market-item"><span>Ambas Marcam:</span> <span>${pAmbas}%</span></div>
                    <div class="market-item"><span>Over 2.5 Gols:</span> <span>${pGols}%</span></div>
                    <div class="market-item"><span>Escanteios:</span> <span>+${corners}</span></div>
                    <div class="market-item"><span>Cartões:</span> <span>+${cartoes}</span></div>
                </div>
                <div class="sugestao-box">
                    🎯 Palpite: ${pCasa > 55 ? 'Vitória '+casa : (pGols > 60 ? 'Over 2.5 Gols' : 'Ambas Marcam')}
                </div>
            `;
            painel.style.display = 'block';
        }
    </script>
</body>
</html>
