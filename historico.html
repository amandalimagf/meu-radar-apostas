<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Tips - Histórico Profissional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(rgba(18, 18, 18, 0.9), rgba(18, 18, 18, 0.95)), url('logo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; padding: 15px; max-width: 600px; margin: auto; 
        }
        .nav-menu { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .nav-menu a { color: white; text-decoration: none; padding: 10px 15px; background: #333; border-radius: 8px; font-weight: bold; white-space: nowrap; }
        .nav-menu a.active { background: #00d1b2; color: #121212; }
        
        /* Estilo do Painel de Dash */
        .dash-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; text-align: center; }
        .dash-item { background: rgba(30, 30, 30, 0.9); padding: 12px 5px; border-radius: 8px; border: 1px solid #333; }
        .dash-label { font-size: 0.6em; color: #aaa; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .dash-valor { font-size: 1.3em; font-weight: bold; color: white; }

        .btn-check { width: 100%; padding: 15px; background: #00d1b2; border: none; border-radius: 10px; color: #121212; font-weight: bold; margin-bottom: 20px; cursor: pointer; transition: 0.2s; }
        .btn-check:hover { background: #00b39a; }
        
        .card { background: rgba(30, 30, 30, 0.9); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #444; }
        .green { border-left-color: #2ecc71; }
        .red { border-left-color: #e74c3c; }
        .status-badge { float: right; font-size: 0.7em; padding: 3px 8px; border-radius: 4px; background: #444; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-menu">
        <a href="index.html">Radar Pro</a>
        <a href="historico.html" class="active">Meu Histórico</a>
    </div>

    <h1 style="text-align: center; color: #00d1b2;">Desempenho 📊</h1>

    <div class="dash-container">
        <div class="dash-item">
            <div class="dash-label">Total</div>
            <div id="dashTotal" class="dash-valor">0</div>
        </div>
        <div class="dash-item">
            <div class="dash-label">Greens</div>
            <div id="dashGreen" class="dash-valor" style="color: #2ecc71;">0</div>
        </div>
        <div class="dash-item">
            <div class="dash-label">Reds</div>
            <div id="dashRed" class="dash-valor" style="color: #e74c3c;">0</div>
        </div>
        <div class="dash-item">
            <div class="dash-label">Acerto</div>
            <div id="dashTaxa" class="dash-valor" style="color: #00d1b2;">0%</div>
        </div>
    </div>

    <button class="btn-check" id="btnAutoCheck" onclick="verificarResultadosAutomatico()">🤖 Conferir Resultados via API</button>

    <div id="listaHistorico"></div>

    <script>
        const API_KEY = 'b9ba384b106c433686606c4dfa53261a';
        const BASE_URL = '/api/football';
        const SUPABASE_URL = 'https://tvdwgfytguwlsppvjvkk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2ZHdnZnl0Z3V3bHNwcHZqdmtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Njk0OTEsImV4cCI6MjA5MjE0NTQ5MX0.mKbLRjWV3eoeAxUtMX-yY24hZQ-mN0aEtnhxk2pH5Us';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarHistorico() {
            const div = document.getElementById('listaHistorico');
            const { data, error } = await clienteSupabase.from('partidas').select('*').order('id', { ascending: false });
            
            if (data) {
                div.innerHTML = '';
                let total = 0, greens = 0, reds = 0;

                data.forEach(item => {
                    // Contagem para o Painel
                    if (item.resultado === 'green') greens++;
                    if (item.resultado === 'red') reds++;
                    if (item.resultado === 'green' || item.resultado === 'red') total++;

                    // Renderização do Card
                    const corClasse = item.resultado === 'green' ? 'green' : (item.resultado === 'red' ? 'red' : '');
                    div.innerHTML += `
                        <div class="card ${corClasse}">
                            <span class="status-badge">${item.resultado ? item.resultado.toUpperCase() : 'PENDENTE'}</span>
                            <strong>${item.time_casa} x ${item.time_fora}</strong><br>
                            <small>🎯 Sugestão: ${item.sugestao_aposta}</small>
                        </div>
                    `;
                });

                // Atualiza os valores no Painel
                document.getElementById('dashTotal').innerText = total;
                document.getElementById('dashGreen').innerText = greens;
                document.getElementById('dashRed').innerText = reds;
                const taxa = total > 0 ? Math.round((greens / total) * 100) : 0;
                document.getElementById('dashTaxa').innerText = `${taxa}%`;
                
                if(taxa < 50 && total > 0) document.getElementById('dashTaxa').style.color = '#e74c3c';
                else if(taxa >= 70) document.getElementById('dashTaxa').style.color = '#2ecc71';
            }
        }

        async function verificarResultadosAutomatico() {
            const btn = document.getElementById('btnAutoCheck');
            btn.disabled = true;
            btn.innerText = '🤖 Conferindo Resultados...';

            const { data: pendentes } = await clienteSupabase.from('partidas').select('*').is('resultado', null).not('id_jogo_api', 'is', null);

            if (!pendentes || pendentes.length === 0) {
                alert("Nenhuma aposta pendente com ID da API encontrada.");
                btn.disabled = false;
                btn.innerText = '🤖 Conferir Resultados via API';
                return;
            }

            for (const aposta of pendentes) {
                try {
                    const res = await fetch(`${BASE_URL}/matches/${aposta.id_jogo_api}`, {
                        headers: { 'X-Auth-Token': API_KEY }
                    });
                    const jogo = await res.json();

                    if (jogo.status === 'FINISHED') {
                        const golsCasa = jogo.score.fullTime.home;
                        const golsFora = jogo.score.fullTime.away;
                        const totalGols = golsCasa + golsFora;
                        let deuGreen = false;

                        const sug = aposta.sugestao_aposta.toLowerCase();
                        
                        if (sug.includes('over 2.5') && totalGols > 2.5) deuGreen = true;
                        else if (sug.includes('vitória') && sug.includes(aposta.time_casa.toLowerCase()) && golsCasa > golsFora) deuGreen = true;
                        else if (sug.includes('vitória') && sug.includes(aposta.time_fora.toLowerCase()) && golsFora > golsCasa) deuGreen = true;
                        else if (sug.includes('ambas marcam') && golsCasa > 0 && golsFora > 0) deuGreen = true;
                        else if (sug.includes('casa ou empate') && golsCasa >= golsFora) deuGreen = true;

                        const resultadoFinal = deuGreen ? 'green' : 'red';
                        await clienteSupabase.from('partidas').update({ resultado: resultadoFinal }).eq('id', aposta.id);
                    }
                } catch (e) { console.error("Erro no jogo", aposta.id); }
            }

            alert("Sincronização concluída!");
            location.reload();
        }

        carregarHistorico();
    </script>
</body>
</html>
