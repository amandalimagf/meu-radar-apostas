<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Tips - Histórico Profissional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(rgba(18, 18, 18, 0.9), rgba(18, 18, 18, 0.95)), url('logo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; padding: 15px; max-width: 600px; margin: auto; 
        }
        .nav-menu { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .nav-menu a { color: white; text-decoration: none; padding: 10px 15px; background: #333; border-radius: 8px; font-weight: bold; white-space: nowrap; }
        .nav-menu a.active { background: #00d1b2; color: #121212; }
        
        .dash-container { display: grid; gap: 10px; margin-bottom: 10px; text-align: center; }
        .dash-grid-4 { grid-template-columns: repeat(4, 1fr); }
        .dash-grid-2 { grid-template-columns: 1fr 1fr; margin-bottom: 20px; }
        
        .dash-item { background: rgba(30, 30, 30, 0.9); padding: 12px 5px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        .dash-label { font-size: 0.65em; color: #aaa; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; text-align: center;}
        .dash-valor { font-size: 1.3em; font-weight: bold; color: white; text-align: center;}

        .btn-check { width: 100%; padding: 15px; background: #00d1b2; border: none; border-radius: 10px; color: #121212; font-weight: bold; margin-bottom: 20px; cursor: pointer; transition: 0.2s; }
        .btn-check:hover { background: #00b39a; }
        
        .card { background: rgba(30, 30, 30, 0.9); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #444; position: relative;}
        .green { border-left-color: #2ecc71; }
        .red { border-left-color: #e74c3c; }
        
        .status-badge { float: right; font-size: 0.7em; padding: 3px 8px; border-radius: 4px; background: #444; font-weight: bold; }
        .data-badge { font-size: 0.75em; color: #aaa; margin-bottom: 5px; display: block; }
        .placar-box { background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 6px; font-weight: bold; color: #00d1b2; margin-top: 10px; display: inline-block; }

        select.filtro-mes { width: 100%; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 8px; font-size: 1em; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav-menu">
        <a href="index.html">Radar Pro</a>
        <a href="historico.html" class="active">Meu Histórico</a>
    </div>

    <h1 style="text-align: center; color: #00d1b2; margin-bottom: 15px;">Desempenho 📊</h1>

    <select id="filtroMes" class="filtro-mes" onchange="renderizarTela()">
        <option value="todos">Todos os Meses</option>
    </select>

    <div class="dash-container dash-grid-4">
        <div class="dash-item"><div class="dash-label">Total</div><div id="dashTotal" class="dash-valor">0</div></div>
        <div class="dash-item"><div class="dash-label">Greens</div><div id="dashGreen" class="dash-valor" style="color: #2ecc71;">0</div></div>
        <div class="dash-item"><div class="dash-label">Reds</div><div id="dashRed" class="dash-valor" style="color: #e74c3c;">0</div></div>
        <div class="dash-item"><div class="dash-label">Acerto</div><div id="dashTaxa" class="dash-valor" style="color: #00d1b2;">0%</div></div>
    </div>

    <div class="dash-container dash-grid-2">
        <div class="dash-item" style="border-color: #f39c12;"><div class="dash-label" style="color: #f39c12;">🏆 Melhor Mercado</div><div id="dashMercado" class="dash-valor" style="font-size: 1.1em;">-</div></div>
        <div class="dash-item" style="border-color: #ff4757;"><div class="dash-label" style="color: #ff4757;">🔥 Sequência Atual</div><div id="dashStreak" class="dash-valor" style="font-size: 1.1em;">0</div></div>
    </div>

    <button class="btn-check" id="btnAutoCheck" onclick="verificarResultadosAutomatico()">🤖 Conferir Resultados via API</button>

    <div id="listaHistorico"></div>

    <script>
        const API_KEY = 'b9ba384b106c433686606c4dfa53261a';
        const BASE_URL = '/api/football';
        const SUPABASE_URL = 'https://tvdwgfytguwlsppvjvkk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2ZHdnZnl0Z3V3bHNwcHZqdmtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Njk0OTEsImV4cCI6MjA5MjE0NTQ5MX0.mKbLRjWV3eoeAxUtMX-yY24hZQ-mN0aEtnhxk2pH5Us';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosOsJogos = [];

        async function carregarHistorico() {
            const { data } = await clienteSupabase.from('partidas').select('*').order('id', { ascending: false });
            if (data) {
                todosOsJogos = data;
                preencherFiltroMes(data);
                renderizarTela();
            }
        }

        function preencherFiltroMes(data) {
            const select = document.getElementById('filtroMes');
            const mesesUnicos = new Set();
            data.forEach(item => {
                if (item.created_at) {
                    const dataObj = new Date(item.created_at);
                    mesesUnicos.add(`${dataObj.getFullYear()}-${String(dataObj.getMonth() + 1).padStart(2, '0')}`);
                }
            });
            Array.from(mesesUnicos).sort().reverse().forEach(mesAno => {
                const [ano, mes] = mesAno.split('-');
                const nomeMes = new Date(ano, mes - 1).toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
                const option = document.createElement('option');
                option.value = mesAno;
                option.text = nomeMes.charAt(0).toUpperCase() + nomeMes.slice(1);
                select.appendChild(option);
            });
        }

        function renderizarTela() {
            const mesSelecionado = document.getElementById('filtroMes').value;
            const div = document.getElementById('listaHistorico');
            div.innerHTML = '';
            
            let total = 0, greens = 0, reds = 0, streak = 0;
            let contandoStreak = true;
            let mercados = { 'Over 2.5': { total: 0, greens: 0 }, 'Ambas Marcam': { total: 0, greens: 0 }, 'Dupla Chance': { total: 0, greens: 0 }, 'Vitória Casa': { total: 0, greens: 0 }, 'Vitória Fora': { total: 0, greens: 0 } };

            let jogosFiltrados = todosOsJogos;
            if (mesSelecionado !== 'todos') {
                jogosFiltrados = todosOsJogos.filter(item => item.created_at && item.created_at.startsWith(mesSelecionado));
            }

            // Cálculos matemáticos na ordem cronológica (para Streak)
            jogosFiltrados.slice().reverse().forEach(item => {
                if (item.resultado === 'green') { greens++; total++; if(contandoStreak) streak++; }
                else if (item.resultado === 'red') { reds++; total++; contandoStreak = false; streak = 0; }
                
                if (item.resultado) {
                    let sug = item.sugestao_aposta || '';
                    let tipo = sug.includes('Over 2.5') ? 'Over 2.5' : sug.includes('Ambas') ? 'Ambas Marcam' : sug.includes('Dupla') ? 'Dupla Chance' : sug.includes(item.time_casa) ? 'Vitória Casa' : 'Vitória Fora';
                    if (mercados[tipo]) { mercados[tipo].total++; if (item.resultado === 'green') mercados[tipo].greens++; }
                }
            });

            // Ordenação Visual: Pendente (0) -> Green (1) -> Red (2) + Sub-ordem ID Decrescente
            let listaVisual = [...jogosFiltrados].sort((a, b) => {
                const peso = (r) => r === 'green' ? 1 : r === 'red' ? 2 : 0;
                if (peso(a.resultado) !== peso(b.resultado)) return peso(a.resultado) - peso(b.resultado);
                return b.id - a.id;
            });

            listaVisual.forEach(item => {
                const corClasse = item.resultado === 'green' ? 'green' : (item.resultado === 'red' ? 'red' : '');
                const dataFormatada = new Date(item.created_at).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
                
                div.innerHTML += `
                    <div class="card ${corClasse}">
                        <span class="status-badge">${item.resultado ? item.resultado.toUpperCase() : 'PENDENTE'}</span>
                        <span class="data-badge">📅 ${dataFormatada}</span>
                        <strong>${item.time_casa} x ${item.time_fora}</strong><br>
                        <small>🎯 Sugestão: ${item.sugestao_aposta}</small>
                        ${item.placar ? `<br><div class="placar-box">Placar: ${item.placar}</div>` : ''}
                    </div>
                `;
            });

            document.getElementById('dashTotal').innerText = total;
            document.getElementById('dashGreen').innerText = greens;
            document.getElementById('dashRed').innerText = reds;
            const taxa = total > 0 ? Math.round((greens / total) * 100) : 0;
            document.getElementById('dashTaxa').innerText = `${taxa}%`;
            document.getElementById('dashStreak').innerText = `${streak} 🔥`;
            
            let melhorM = 'Nenhum', maxT = -1;
            for (const [n, s] of Object.entries(mercados)) {
                let t = s.total > 0 ? (s.greens / s.total) * 100 : -1;
                if (t > maxT) { maxT = t; melhorM = n; }
            }
            document.getElementById('dashMercado').innerText = maxT > -1 ? `${melhorM} (${Math.round(maxT)}%)` : `---`;
        }

        async function verificarResultadosAutomatico() {
            const btn = document.getElementById('btnAutoCheck');
            btn.disabled = true; btn.innerText = '🤖 Conferindo...';

            const { data: pendentes } = await clienteSupabase.from('partidas').select('*').is('resultado', null).not('id_jogo_api', 'is', null);
            if (!pendentes || pendentes.length === 0) { alert("Nenhum pendente."); btn.disabled = false; btn.innerText = '🤖 Conferir Resultados via API'; return; }

            for (const aposta of pendentes) {
                try {
                    const res = await fetch(`${BASE_URL}/matches/${aposta.id_jogo_api}`, { headers: { 'X-Auth-Token': API_KEY } });
                    const jogo = await res.json();
                    if (jogo.status === 'FINISHED') {
                        const h = jogo.score.fullTime.home;
                        const a = jogo.score.fullTime.away;
                        const placarString = `${h} x ${a}`;
                        const total = h + a;
                        let deu = false;
                        const s = aposta.sugestao_aposta.toLowerCase();

                        if (s.includes('over 2.5') && total > 2.5) deu = true;
                        else if (s.includes('vitória') && s.includes(aposta.time_casa.toLowerCase()) && h > a) deu = true;
                        else if (s.includes('vitória') && s.includes(aposta.time_fora.toLowerCase()) && a > h) deu = true;
                        else if (s.includes('ambas') && h > 0 && a > 0) deu = true;
                        else if (s.includes('casa ou empate') && h >= a) deu = true;

                        await clienteSupabase.from('partidas').update({ 
                            resultado: deu ? 'green' : 'red',
                            placar: placarString 
                        }).eq('id', aposta.id);
                    }
                } catch (e) { console.error(e); }
            }
            location.reload();
        }
        carregarHistorico();
    </script>
</body>
</html>
