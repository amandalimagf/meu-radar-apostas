<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetPredictor - Gestão de Banca</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00d1b2; --bg: #121212; --card: #1e1e1e; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: white; padding: 20px; max-width: 900px; margin: auto; }
        
        .nav-menu { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center;}
        .nav-menu a { color: white; text-decoration: none; padding: 10px 20px; background: #333; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .nav-menu a:hover { filter: brightness(1.2); }
        .nav-menu a.active { background: var(--primary); color: #121212; }

        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-card h3 { margin: 0; font-size: 0.85em; color: #888; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0 0; font-size: 1.8em; font-weight: bold; }

        .table-container { background: var(--card); border-radius: 12px; overflow-x: auto; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 700px; }
        th { background: #252525; padding: 15px; font-size: 0.9em; color: #888; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #333; vertical-align: middle; }
        
        .pos { color: var(--green); font-weight: bold;}
        .neg { color: var(--red); font-weight: bold;}
        
        /* Estilos dos Inputs */
        .input-money { width: 80px; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #121212; color: white; text-align: center; }
        .input-odd { width: 60px; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #121212; color: white; text-align: center; }
        
        .btn-update { padding: 8px 12px; background: var(--primary); color: #121212; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85em; transition: 0.2s; }
        .btn-update:hover { filter: brightness(1.1); }
        .btn-update:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="nav-menu">
        <a href="index.html">Radar Pro</a>
        <a href="historico.html">Meu Histórico</a>
        <a href="banca.html" class="active">Gestão de Banca</a>
    </div>

    <div class="header">
        <h1>Painel Financeiro 💰</h1>
        <p style="color: #bbb; font-size: 0.9em;">Acompanhe o retorno real das suas análises.</p>
    </div>

    <div class="dashboard">
        <div class="stat-card">
            <h3>Banca Atual</h3>
            <p id="currentBank">R$ 0,00</p>
        </div>
        <div class="stat-card">
            <h3>Lucro / Prejuízo</h3>
            <p id="totalProfit">R$ 0,00</p>
        </div>
        <div class="stat-card">
            <h3>ROI (Retorno)</h3>
            <p id="totalROI">0%</p>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Confronto</th>
                    <th>Status</th>
                    <th>Valor Apostado (R$)</th>
                    <th>Odd Paga</th>
                    <th>Lucro Líquido</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="bankTable">
                <tr><td colspan="6" style="text-align: center;">Carregando dados financeiros...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // --- CONFIGURAÇÕES ---
        const SUPABASE_URL = 'https://yzvaughqwbeieiimxwooj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6dmF1Z2hxd2JlaWVpbXh3b29qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjYyNjMsImV4cCI6MjA5MjEwMjI2M30.Ivm9CI-cVaM0e2MW7IEILgZU5yG_kpD35p8hEdSdD48';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- CARREGAR DADOS ---
        async function carregarDadosFinanceiros() {
            // Busca apenas os jogos que já não estão mais pendentes
            const { data, error } = await supabase
                .from('partidas')
                .select('*')
                .neq('status', 'Pendente')
                .order('data_jogo', { ascending: false });
            
            if (error) {
                document.getElementById('bankTable').innerHTML = `<tr><td colspan="6" class="neg">Erro ao carregar os dados.</td></tr>`;
                return;
            }

            let totalProfit = 0;
            let totalInvested = 0;
            const tableBody = document.getElementById('bankTable');
            tableBody.innerHTML = '';

            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center;">Você ainda não marcou nenhum Green ou Red no Histórico.</td></tr>`;
                atualizarPainel(0, 0);
                return;
            }

            // --- MONTAR A TABELA ---
            data.forEach(item => {
                // Se o valor estiver vazio no banco, deixa 0
                const aposta = item.valor_aposta || 0; 
                const odd = item.odd_final || 0;
                let lucroLiq = 0;

                // Lógica Financeira Real
                if (aposta > 0 && odd > 0) {
                    if (item.status === 'Green') {
                        lucroLiq = (aposta * odd) - aposta; // Se ganhou, ganha o lucro limpo
                    } else if (item.status === 'Red') {
                        lucroLiq = -aposta; // Se perdeu, perde a aposta inteira
                    }
                    totalProfit += lucroLiq;
                    totalInvested += aposta;
                }

                const textoLucro = lucroLiq >= 0 ? `+ R$ ${lucroLiq.toFixed(2)}` : `- R$ ${Math.abs(lucroLiq).toFixed(2)}`;
                const classeLucro = lucroLiq >= 0 ? 'pos' : 'neg';
                const statusColor = item.status === 'Green' ? 'pos' : 'neg';

                tableBody.innerHTML += `
                    <tr>
                        <td style="font-size: 0.9em; font-weight: bold;">${item.time_casa} x ${item.time_fora}</td>
                        <td class="${statusColor}">${item.status}</td>
                        <td>
                            <input type="number" id="aposta_${item.id}" class="input-money" value="${aposta}" step="0.50" min="0" placeholder="0.00">
                        </td>
                        <td>
                            <input type="number" id="odd_${item.id}" class="input-odd" value="${odd}" step="0.01" min="1" placeholder="1.00">
                        </td>
                        <td class="${classeLucro}">${aposta > 0 ? textoLucro : '-'}</td>
                        <td>
                            <button class="btn-update" id="btn_${item.id}" onclick="atualizarValores('${item.id}', this)">Salvar</button>
                        </td>
                    </tr>
                `;
            });

            atualizarPainel(totalProfit, totalInvested);
        }

        // --- ATUALIZAR NÚMEROS DO TOPO ---
        function atualizarPainel(lucro, investido) {
            // A Banca Atual parte de ZERO e soma o lucro/prejuízo
            const bancaAtual = 0 + lucro;

            document.getElementById('currentBank').innerText = `R$ ${bancaAtual.toFixed(2)}`;
            document.getElementById('currentBank').className = bancaAtual >= 0 ? 'pos' : 'neg';

            document.getElementById('totalProfit').innerText = lucro >= 0 ? `+ R$ ${lucro.toFixed(2)}` : `- R$ ${Math.abs(lucro).toFixed(2)}`;
            document.getElementById('totalProfit').className = lucro >= 0 ? 'pos' : 'neg';
            
            const roi = investido > 0 ? (lucro / investido) * 100 : 0;
            document.getElementById('totalROI').innerText = `${roi.toFixed(1)}%`;
            document.getElementById('totalROI').className = roi >= 0 ? 'pos' : 'neg';
        }

        // --- SALVAR MUDANÇAS NO SUPABASE ---
        async function atualizarValores(id, btn) {
            const novaAposta = parseFloat(document.getElementById(`aposta_${id}`).value) || 0;
            const novaOdd = parseFloat(document.getElementById(`odd_${id}`).value) || 0;

            btn.innerText = "⏳";
            btn.disabled = true;

            const { error } = await supabase
                .from('partidas')
                .update({ 
                    valor_aposta: novaAposta, 
                    odd_final: novaOdd 
                })
                .eq('id', id);

            if (error) {
                console.error(error);
                btn.innerText = "Erro";
                btn.style.background = "var(--red)";
            } else {
                // Atualiza a tela toda para recalcular a banca
                carregarDadosFinanceiros();
            }
        }

        // Inicia o carregamento assim que a página abre
        window.onload = carregarDadosFinanceiros;
    </script>
</body>
</html>
