<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Pro - Gestão de Banca</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00d1b2; --bg: #121212; --card: #1e1e1e; --green: #2ecc71; --orange: #f39c12; --red: #e74c3c; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(rgba(18, 18, 18, 0.85), rgba(18, 18, 18, 0.95)), url('logo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            padding: 15px; 
            max-width: 600px; 
            margin: auto; 
        }
        
        .nav-menu { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .nav-menu a { color: white; text-decoration: none; padding: 10px 15px; background: #333; border-radius: 8px; font-weight: bold; white-space: nowrap; transition: 0.2s; }
        .nav-menu a.active { background: var(--primary); color: #121212; }

        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-size: 1.8em; }

        .dashboard { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px; }
        .dash-card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .dash-card h3 { margin: 0 0 10px 0; color: #aaa; font-size: 0.9em; text-transform: uppercase; }
        .dash-card .valor { font-size: 2em; font-weight: bold; color: var(--primary); }
        
        .btn-config { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 6px; margin-top: 10px; cursor: pointer; }

        h2 { font-size: 1.2em; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }

        .aposta-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--orange); }
        .confronto { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
        .sugestao-txt { color: #aaa; font-size: 0.85em; margin-bottom: 15px; }

        .inputs-aposta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .inputs-aposta div { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.8em; color: #888; text-transform: uppercase; font-weight: bold;}
        input { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: white; font-weight: bold;}

        .action-buttons { display: flex; gap: 10px; }
        .btn-green { flex: 1; background: rgba(46, 204, 113, 0.2); color: var(--green); border: 1px solid var(--green); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-green:hover { background: var(--green); color: #121212; }
        
        .btn-red { flex: 1; background: rgba(231, 76, 60, 0.2); color: var(--red); border: 1px solid var(--red); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-red:hover { background: var(--red); color: white; }
    </style>
</head>
<body>

    <div class="nav-menu">
        <a href="index.html">Radar Pro</a>
        <a href="historico.html">Meu Histórico</a>
        <a href="banca.html" class="active">Gestão de Banca</a>
    </div>

    <div class="header">
        <h1>Financeiro 📊</h1>
    </div>

    <div class="dashboard">
        <div class="dash-card">
            <h3>Saldo Atual da Banca</h3>
            <div class="valor" id="saldoDisplay">R$ 0,00</div>
            <button class="btn-config" onclick="configurarBanca()">Atualizar Saldo Inicial</button>
        </div>
    </div>

    <h2>Apostas Pendentes (Para dar Baixa)</h2>
    <div id="listaPendentes">
        <p style="text-align: center; color: #888;">Carregando apostas do radar...</p>
    </div>

    <script>
        // SUAS CHAVES NOVAS DO SUPABASE
        const SUPABASE_URL = 'https://tvdwgfytguwlsppvjvkk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2ZHdnZnl0Z3V3bHNwcHZqdmtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Njk0OTEsImV4cCI6MjA5MjE0NTQ5MX0.mKbLRjWV3eoeAxUtMX-yY24hZQ-mN0aEtnhxk2pH5Us';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. CARREGAR SALDO LOCAL
        let saldoAtual = parseFloat(localStorage.getItem('minhaBanca')) || 0;
        atualizarTelaSaldo();

        function configurarBanca() {
            let novoValor = prompt("Qual o valor atual da sua banca? (Ex: 1000.50)", saldoAtual);
            if (novoValor !== null && !isNaN(novoValor)) {
                saldoAtual = parseFloat(novoValor);
                localStorage.setItem('minhaBanca', saldoAtual);
                atualizarTelaSaldo();
            }
        }

        function atualizarTelaSaldo() {
            document.getElementById('saldoDisplay').innerText = `R$ ${saldoAtual.toFixed(2).replace('.', ',')}`;
        }

        // 2. BUSCAR APOSTAS PENDENTES NO SUPABASE
        async function carregarPendentes() {
            const divLista = document.getElementById('listaPendentes');
            
            // Busca os jogos que AINDA NÃO TEM resultado preenchido
            const { data, error } = await clienteSupabase
                .from('partidas')
                .select('*')
                .is('resultado', null)
                .order('id', { ascending: false });

            if (error) {
                divLista.innerHTML = `<p style="color:red; text-align:center;">Erro ao conectar com o banco.</p>`;
                return;
            }

            if (!data || data.length === 0) {
                divLista.innerHTML = `<p style="text-align:center; padding: 20px; background:var(--card); border-radius:8px;">Nenhuma aposta pendente. Vá ao Radar para buscar mais jogos!</p>`;
                return;
            }

            divLista.innerHTML = '';
            data.forEach(aposta => {
                const card = document.createElement('div');
                card.className = 'aposta-card';
                card.id = `aposta_${aposta.id}`;
                card.innerHTML = `
                    <div class="confronto">${aposta.time_casa} x ${aposta.time_fora}</div>
                    <div class="sugestao-txt">📌 Radar Sugeriu: ${aposta.sugestao_aposta}</div>
                    
                    <div class="inputs-aposta">
                        <div>
                            <label>Valor Apostado (R$)</label>
                            <input type="number" id="valor_${aposta.id}" placeholder="Ex: 50" step="0.01">
                        </div>
                        <div>
                            <label>Odd (Cotação)</label>
                            <input type="number" id="odd_${aposta.id}" placeholder="Ex: 1.85" step="0.01">
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn-green" onclick="resolverAposta(${aposta.id}, 'green', this)">✅ GREEN</button>
                        <button class="btn-red" onclick="resolverAposta(${aposta.id}, 'red', this)">❌ RED</button>
                    </div>
                `;
                divLista.appendChild(card);
            });
        }

        // 3. DAR BAIXA NA APOSTA (CALCULAR LUCRO E SALVAR)
        async function resolverAposta(idAposta, resultadoFinal, btnElement) {
            const valorInput = document.getElementById(`valor_${idAposta}`).value;
            const oddInput = document.getElementById(`odd_${idAposta}`).value;

            if (!valorInput || !oddInput) {
                alert("Por favor, preencha o Valor Apostado e a Odd para dar a baixa.");
                return;
            }

            const valor = parseFloat(valorInput);
            const odd = parseFloat(oddInput);

            // Calcula a matemática da banca
            if (resultadoFinal === 'green') {
                const lucroPuro = valor * (odd - 1);
                saldoAtual += lucroPuro;
            } else if (resultadoFinal === 'red') {
                saldoAtual -= valor;
            }

            // Atualiza o visor da banca e salva no navegador
            localStorage.setItem('minhaBanca', saldoAtual);
            atualizarTelaSaldo();

            // Salva no Supabase que essa aposta não está mais pendente
            btnElement.innerText = "Salvando...";
            const { error } = await clienteSupabase
                .from('partidas')
                .update({ resultado: resultadoFinal })
                .eq('id', idAposta);

            if (!error) {
                // Remove o card da tela com uma animação
                const card = document.getElementById(`aposta_${idAposta}`);
                card.style.opacity = '0';
                setTimeout(() => card.remove(), 300);
            } else {
                alert("Erro ao salvar no banco de dados.");
                btnElement.innerText = resultadoFinal === 'green' ? "✅ GREEN" : "❌ RED";
            }
        }

        // Inicia a página
        carregarPendentes();
    </script>
</body>
</html>
